services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-linear-db
    restart: unless-stopped
    ports:
      - "5433:5432"
    environment:
      POSTGRES_USER: linear
      POSTGRES_PASSWORD: linear
      POSTGRES_DB: mini_linear
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
