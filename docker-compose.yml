services:
  postgres:
    image: postgres:16-alpine
    container_name: mini-linear-db
    restart: unless-stopped
    ports:
      - "${POSTGRES_PORT:-5433}:5432"
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-linear}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-linear}
      POSTGRES_DB: ${POSTGRES_DB:-mini_linear}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-linear} -d ${POSTGRES_DB:-mini_linear}"]
      interval: 5s
      timeout: 5s
      retries: 5

  app:
    profiles: ["prod"]
    build: .
    container_name: mini-linear-app
    restart: unless-stopped
    ports:
      - "${APP_PORT:-3000}:3000"
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER:-linear}:${POSTGRES_PASSWORD:-linear}@postgres:5432/${POSTGRES_DB:-mini_linear}
      APP_URL: ${APP_URL:-http://localhost:3000}
      NODE_ENV: production
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test:
        [
          "CMD",
          "node",
          "-e",
          "fetch('http://localhost:3000/api/health').then((r) => process.exit(r.ok ? 0 : 1)).catch(() => process.exit(1))",
        ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

volumes:
  postgres_data:
